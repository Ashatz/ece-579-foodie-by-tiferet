# FOODIE config.yml
# Single configuration file (Tiferet v2.0 style)
# Registers all services, features, and CLI commands

# Application interfaces
interfaces:
  foodie:
    name: FOODIE Expert System
    description: AI Expert System for campus food delivery robots (ECE 479/579 Spring 2026)

# Dependency injection mappings (services)
attrs:
  item_service:
    module_path: foodie.repos.item
    class_name: ItemYamlRepository
    params:
      item_yaml_file: configs/menu.yml

  beverage_service:
    module_path: foodie.repos.beverage
    class_name: BeverageYamlRepository
    params:
      menu_yaml_file: configs/menu.yml

  order_service:
    module_path: foodie.repos.order
    class_name: OrderSqliteRepository
    params:
      db_path: foodie.db

  bag_service:
    module_path: foodie.repos.bag
    class_name: BagSqliteRepository
    params:
      db_path: foodie.db

  location_service:
    module_path: foodie.repos.location
    class_name: LocationSqliteRepository
    params:
      db_path: foodie.db

  robot_service:
    module_path: foodie.repos.robot
    class_name: RobotSqliteRepository
    params:
      db_path: foodie.db

# Feature workflows (map CLI commands to domain events)
features:
  bag.order:
    name: Bag Order
    description: Run FOODIE_BAGGER rule-based expert (Goal B)
    steps:
      - attribute_id: bag_order_event

  plan.routes:
    name: Plan Routes
    description: Optimize multi-robot delivery routes with A* (Goal A)
    steps:
      - attribute_id: plan_route_event

  select.beverage:
    name: Select Beverage
    description: Backward-chaining beverage selector for guests (Goal C)
    steps:
      - attribute_id: select_beverage_event

  seed.data:
    name: Seed Data
    description: Load pre-generated sample data for demo
    steps:
      - attribute_id: seed_data_event

# CLI command definitions
cli:
  cmds:
    bag-order:
      group_key: foodie
      key: bag-order
      name: Bag Order Command
      description: Run FOODIE_BAGGER rule-based expert (Goal B)
      args:
        - name_or_flags: [order_id]
          description: Order identifier
        - name_or_flags: [destination]
          description: Delivery location

    plan-routes:
      group_key: foodie
      key: plan-routes
      name: Plan Routes Command
      description: Optimize multi-robot delivery routes (Goal A)

    select-beverage:
      group_key: foodie
      key: select-beverage
      name: Select Beverage Command
      description: Backward-chaining beverage selector (Goal C)
      args:
        - name_or_flags: [--health-nut]
          description: Guest is health-conscious
          action: store_true
        - name_or_flags: [--allergies]
          description: Comma-separated list of allergens

    seed-data:
      group_key: foodie
      key: seed-data
      name: Seed Data Command
      description: Load pre-generated sample data